journey:
  name: "Evidence-Backed Intent Authorization"
  goal: "Ensure agent authorization requests are grounded in verifiable system state, preventing fabricated justification"
  persona: "Ravi Patel (workspace admin) + Logistics-Planner (autonomous agent)"

  emotional_arc:
    start: "Cautious -- can I trust agents with real authority over supply chain decisions?"
    middle: "Methodical -- evidence checks are systematic and transparent"
    end: "Confident -- fabrication attempts are caught, legitimate actions proceed smoothly"

steps:
  - id: 1
    name: "Evidence Accumulates Organically"
    action: "Agents and humans work normally; decisions get confirmed, tasks complete, observations accumulate"

    shared_artifacts:
      - name: "graph_entities"
        source: "SurrealDB tables (decision, task, observation, policy, etc.)"
        displayed_as: "${entity_type}:${entity_id}"
        consumers:
          - "Evidence pool for intent submission"
          - "Observer anomaly detection"

    emotional_state:
      entry: "Neutral -- business as usual"
      exit: "Neutral -- evidence pool grows without explicit effort"

    integration_checkpoint: |
      Graph entities have workspace scope, created_at timestamps, and status fields.
      These are prerequisites for the verification pipeline.

    gherkin: |
      Scenario: Graph entities accumulate as evidence pool
        Given Ravi Patel has confirmed the decision "Switch to regional warehousing for Southeast Asia"
        And the Logistics-Planner agent has completed the task "Audit current fulfillment SLAs"
        And the Observer has created a verified observation "Supplier lead times increased 40% in Q2"
        Then each entity has a workspace scope, created_at timestamp, and a valid status
        And each entity is available as a potential evidence reference

  - id: 2
    name: "Agent Submits Intent with Evidence"
    action: "Agent creates intent record with evidence_refs pointing to existing graph records"

    shared_artifacts:
      - name: "evidence_refs"
        source: "Intent record (intent.evidence_refs field in SurrealDB)"
        displayed_as: "${evidence_refs}"
        consumers:
          - "Verification pipeline (step 3)"
          - "LLM evaluator context"
          - "Governance feed display"
          - "Audit trail"

    emotional_state:
      entry: "Cautious -- agent is requesting a consequential action"
      exit: "Watchful -- intent is submitted, verification pending"

    integration_checkpoint: |
      evidence_refs must be valid RecordId references to existing graph entity tables.
      The intent record must be in draft status before transitioning to pending_auth.

    gherkin: |
      Scenario: Agent submits intent with evidence references
        Given the Logistics-Planner agent wants to reroute Southeast Asia orders
        And the workspace has confirmed decision "Switch to regional warehousing"
        And the workspace has completed task "Audit current fulfillment SLAs"
        When the agent creates an intent with evidence_refs pointing to both records
        Then the intent is created with status "draft"
        And the intent contains 2 evidence references

  - id: 3
    name: "Deterministic Evidence Verification"
    action: "Fast pipeline verifies each evidence reference before LLM evaluation"

    shared_artifacts:
      - name: "evidence_verification"
        source: "Intent record (intent.evidence_verification field in SurrealDB)"
        displayed_as: "${evidence_verification}"
        consumers:
          - "Risk router (step 4)"
          - "LLM evaluator (enriched context)"
          - "Governance feed (step 5)"
          - "Audit trail"

    emotional_state:
      entry: "Watchful -- is the evidence legitimate?"
      exit: "Reassured -- deterministic checks completed in milliseconds"

    integration_checkpoint: |
      Verification must complete before LLM evaluation begins.
      Verification result must be stored on the intent record.
      Failed refs must be individually identified.

    gherkin: |
      Scenario: Evidence verification passes for valid references
        Given an intent with 3 evidence references in the same workspace
        And all referenced records exist with valid statuses
        And at least 1 reference is authored by a different identity than the requester
        When the verification pipeline runs
        Then evidence_verification.verified_count equals 3
        And evidence_verification.failed_refs is empty
        And evidence_verification.verification_time_ms is less than 100

      Scenario: Evidence verification catches non-existent reference
        Given an intent with evidence_ref pointing to observation:nonexistent
        When the verification pipeline runs
        Then evidence_verification.failed_refs contains "observation:nonexistent"
        And the intent risk score is increased by the evidence shortfall penalty

      Scenario: Evidence verification catches cross-workspace reference
        Given an intent in workspace "acme-supply-chain"
        And an evidence_ref pointing to a decision in workspace "other-org"
        When the verification pipeline runs
        Then the reference fails scope containment check
        And evidence_verification.failed_refs contains the cross-workspace reference

  - id: 4
    name: "Risk-Tiered Authorization with Evidence"
    action: "Risk router combines LLM risk score with evidence quality for routing decision"

    shared_artifacts:
      - name: "routing_decision"
        source: "Risk router output"
        displayed_as: "${route}"
        consumers:
          - "Intent status machine transition"
          - "Veto window manager"
          - "Governance feed"

    emotional_state:
      entry: "Methodical -- evidence has been checked, risk is being assessed"
      exit: "Confident -- routing decision reflects both risk and evidence quality"

    integration_checkpoint: |
      Evidence quality must influence the effective risk score.
      Soft enforcement: shortfall adds to risk score.
      Hard enforcement: insufficient evidence rejects before LLM.

    gherkin: |
      Scenario: Well-evidenced low-risk intent is auto-approved
        Given an intent with risk score 20 and all evidence verified
        And the workspace evidence enforcement is "hard"
        When the risk router evaluates the intent
        Then the routing decision is "auto_approve"

      Scenario: Missing evidence elevates risk under soft enforcement
        Given an intent requiring 2 evidence refs but providing only 1
        And the workspace evidence enforcement is "soft"
        And the LLM risk score is 25
        When the risk router evaluates the intent
        Then the effective risk score is 45 (25 + 20 shortfall penalty)
        And the routing decision is "veto_window"

      Scenario: Insufficient evidence rejects under hard enforcement
        Given an intent requiring 3 evidence refs but providing only 1
        And the workspace evidence enforcement is "hard"
        When the verification pipeline runs
        Then the intent is rejected before LLM evaluation
        And the error reason explains the evidence shortfall

  - id: 5
    name: "Governance Feed Shows Evidence Chain"
    action: "Human reviews intent in feed with full evidence provenance"

    shared_artifacts:
      - name: "feed_evidence_display"
        source: "Intent record (evidence_refs + evidence_verification)"
        displayed_as: "Evidence card in governance feed"
        consumers:
          - "Human reviewer (Ravi)"
          - "Audit trail"

    emotional_state:
      entry: "Evaluating -- reviewing the evidence chain"
      exit: "Confident -- evidence is transparent, decision is informed"

    integration_checkpoint: |
      Feed must display each evidence ref with its verification status.
      Human must be able to navigate to the referenced entity.

    gherkin: |
      Scenario: Feed displays verified evidence chain
        Given an intent in "pending_veto" status with 3 verified evidence refs
        When Ravi Patel views the intent in the governance feed
        Then each evidence reference is displayed with its entity type and title
        And each reference shows its verification status (verified or failed)
        And Ravi can navigate to any referenced entity for detail

integration_validation:
  shared_artifact_consistency:
    - artifact: "evidence_refs"
      must_match_across: [2, 3, 4, 5]
      failure_message: "Evidence references must be consistent from submission through verification, routing, and feed display"

    - artifact: "evidence_verification"
      must_match_across: [3, 4, 5]
      failure_message: "Verification results must be consistent from pipeline output through routing and feed display"

    - artifact: "evidence_enforcement"
      must_match_across: [3, 4]
      failure_message: "Enforcement mode must be consistent between verification pipeline and risk router"
