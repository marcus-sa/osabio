issues_identified:
  confirmation_bias:
    - issue: "Template + scoped session instances (Job 3) was accepted as a decision but stories only cover template identities. Session-scoped instances are deferred without explicit story or spike."
      severity: "low"
      location: "Job 3 / Story map"
      recommendation: "Acceptable deferral -- noted in JTBD analysis as overserved. Create a future spike if needed. No action required for MVP."

    - issue: "The 'system' identity type is now included in the enum ('human', 'agent', 'system') per user direction."
      severity: "resolved"
      location: "US-UI-001, identity_type_enum"
      recommendation: "No action needed — 'system' type included in MVP."

  completeness_gaps:
    - issue: "No explicit story for workspace bootstrap migration of existing data. US-UI-002 mentions one-time bootstrap but does not detail the migration path for existing workspaces."
      severity: "medium"
      location: "US-UI-002"
      recommendation: "Project convention is no backwards compat / no data migration. The bootstrap is for new workspace creation flow. Existing workspaces get fresh data. Clarify this in technical notes."

    - issue: "No NFR for identity query performance. The hub-spoke model adds a join hop for every ownership query."
      severity: "medium"
      location: "Cross-cutting"
      recommendation: "Add property scenario: 'Given 1000 tasks with identity owners, identity resolution adds less than 5ms per query.' Or accept that SurrealDB graph traversal is fast enough for current scale."

    - issue: "Extraction prompt changes (US-UI-007) may affect extraction accuracy for existing entity types. No regression scenario."
      severity: "medium"
      location: "US-UI-007"
      recommendation: "Add scenario: 'Given existing person/task/decision extraction works, when agent resolution is added, then existing extraction accuracy is not degraded.' Or delegate to eval suite."

  clarity_issues: []

  testability_concerns:
    - issue: "Property scenario 'No unattributed actions exist in the graph' is hard to test exhaustively."
      severity: "low"
      location: "journey-unified-audit.feature"
      recommendation: "Implement as a smoke test that samples N random entities and verifies owner type. Full exhaustive check is impractical."

  priority_validation:
    q1_largest_bottleneck: "YES -- agent attribution gap is the primary identity problem, confirmed by user's first query desire"
    q2_simple_alternatives: "ADEQUATE -- hub-and-spoke was chosen over alternatives (separate tables, thin join node) with clear rationale in UPDATE_IDENTITY_NODE.md"
    q3_constraint_prioritization: "CORRECT -- no backwards compat constraint correctly prioritized (simplifies migration), breaking changes accepted"
    q4_data_justified: "NO_DATA -- opportunity scores are team estimates (N=1). Acceptable for solo founder project, flagged as directional."
    verdict: "PASS"

