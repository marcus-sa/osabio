journey:
  name: "Manage Skill Library"
  goal: "Workspace admin builds and maintains a catalog of domain expertise for agents"
  persona: "Marcus (Workspace Admin) — manages skill catalog, governs usage"

  emotional_arc:
    start: "Purposeful — building the expertise foundation"
    middle: "Organized — library is taking shape"
    end: "Satisfied — agents can draw from curated expertise"

steps:
  - id: 1
    name: "Browse Skill Library"
    action: "Navigate to Skill Library page, view catalog of workspace skills"

    shared_artifacts:
      - name: "workspace_skills_list"
        source: "GET /api/workspaces/:id/skills"
        displayed_as: "Skill card list"
        consumers: ["Skill Library page", "Step 2 of agent creation wizard"]
      - name: "skill_status_filter"
        source: "Filter dropdown on Skill Library page"
        displayed_as: "active | draft | deprecated | all"
        consumers: ["Skill Library list query"]

    emotional_state:
      entry: "Curious — what expertise does the workspace have?"
      exit: "Oriented — clear picture of available skills"

    integration_checkpoint: |
      Skills display status badge, source type icon, agent count, and required tools.
      Filter defaults to showing all statuses.
      Agent count is derived from possesses edge count.

    gherkin: |
      Scenario: Browse active skills
        Given Marcus navigates to the Skill Library
        Then he sees a list of all workspace skills
        And each skill card shows name, version, status, description, source type, and agent count

  - id: 2
    name: "Create Skill"
    action: "Fill in skill metadata and source reference, select required tools"

    shared_artifacts:
      - name: "skill_name"
        source: "Create Skill form name field"
        displayed_as: "${skill_name}"
        consumers: ["Skill Library list", "Agent creation Step 2", "Skill detail page"]
      - name: "skill_source"
        source: "Create Skill form source fields (type, repo, ref, subpath)"
        displayed_as: "${skill_source}"
        consumers: ["Skill detail page", "Session lifecycle setSkillsConfig call"]
      - name: "skill_required_tools"
        source: "Create Skill form required tools checklist"
        displayed_as: "${skill_required_tools}"
        consumers: ["skill_requires edges", "Agent creation Step 3 skill-derived tools"]

    emotional_state:
      entry: "Productive — defining new expertise"
      exit: "Accomplished — skill exists in the catalog"

    integration_checkpoint: |
      Skill created with status=draft by default.
      skill_requires edges created for selected tools.
      Skill name must be unique within workspace.

    gherkin: |
      Scenario: Create a new skill
        Given Marcus clicks "Create Skill" in the Skill Library
        When he fills in name "security-audit", description, version "1.0"
        And selects source type "GitHub", repository "acme-corp/agent-skills", ref "v1.0", subpath "skills/security-audit"
        And checks required tools "read_file, search_codebase, check_dependencies"
        And clicks "Create Skill"
        Then the skill appears in the library with status "draft"
        And 3 skill_requires edges are created

  - id: 3
    name: "Activate Skill"
    action: "Change skill status from draft to active"

    shared_artifacts:
      - name: "skill_status"
        source: "Skill lifecycle state machine (draft -> active -> deprecated)"
        displayed_as: "Status badge on skill card"
        consumers: ["Skill Library list", "Agent creation Step 2 (only active shown)", "Session lifecycle (only active materialized)"]

    emotional_state:
      entry: "Decisive — skill is reviewed and ready"
      exit: "Satisfied — skill is available for agent assignment"

    integration_checkpoint: |
      Only active skills appear in agent creation wizard Step 2.
      Only active skills are passed to setSkillsConfig at session time.

    gherkin: |
      Scenario: Activate a draft skill
        Given the skill "security-audit" has status "draft"
        When Marcus clicks "Activate" on the skill detail page
        Then the status changes to "active"
        And the skill becomes available in the agent creation wizard

  - id: 4
    name: "Deprecate Skill"
    action: "Change skill status from active to deprecated"

    shared_artifacts:
      - name: "affected_agents"
        source: "SELECT in FROM possesses WHERE out = $skill"
        displayed_as: "List of agent names in confirmation dialog"
        consumers: ["Deprecation confirmation dialog"]

    emotional_state:
      entry: "Cautious — need to understand impact"
      exit: "In control — deprecated with full awareness of consequences"

    integration_checkpoint: |
      Deprecation shows affected agents in confirmation dialog.
      Deprecated skills are excluded from agent creation wizard.
      Deprecated skills are not passed to setSkillsConfig in future sessions.
      Existing possesses edges are not removed (historical record).

    gherkin: |
      Scenario: Deprecate skill in use
        Given the skill "security-audit" is active and assigned to 3 agents
        When Marcus clicks "Deprecate"
        Then a confirmation shows "This skill is assigned to 3 agents: security-auditor, compliance-checker, pen-tester"
        And Marcus confirms deprecation
        Then the status changes to "deprecated"

integration_validation:
  shared_artifact_consistency:
    - artifact: "skill_status"
      must_match_across: [1, 2, 3, 4]
      failure_message: "Skill status must be consistent across library list, detail page, wizard visibility, and session lifecycle"
    - artifact: "skill_required_tools"
      must_match_across: [2, 3]
      failure_message: "Required tools defined at creation must drive skill_requires edges used in agent wizard step 3"
